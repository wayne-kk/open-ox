<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>确认你的 Open-OX 邮箱</title>
  </head>
  <body style="margin:0;background:#f4f3f0;color:#17161b;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',Arial,sans-serif;">
    <div style="display:none;max-height:0;overflow:hidden;opacity:0;">
      确认邮箱后即可进入 Open-OX 工作台，领取欢迎积分并开始构建。
    </div>
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f3f0;">
      <tr>
        <td align="center" style="padding:36px 16px;">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border:1px solid #dedbd2;border-radius:18px;overflow:hidden;box-shadow:0 18px 48px rgba(23,22,27,0.12);">
            <tr>
              <td style="background:#111114;padding:28px 30px;color:#f6f2ff;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                  <tr>
                    <td>
                      <div style="font-size:13px;letter-spacing:0.12em;text-transform:uppercase;color:#b7aceb;">Open-OX</div>
                      <div style="margin-top:10px;font-size:28px;line-height:1.2;font-weight:800;">确认你的邮箱</div>
                    </td>
                    <td align="right" width="56">
                      <div style="width:42px;height:42px;border-radius:50%;background:#0c0c0e;border:1px solid #2a2a2e;display:inline-block;text-align:center;line-height:42px;color:#c7b8ff;font-weight:800;">OX</div>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:34px 30px 10px;">
                <p style="margin:0 0 18px;font-size:16px;line-height:1.7;color:#3a3740;">
                  欢迎来到 Open-OX。点击下面的按钮完成邮箱验证，随后你就可以进入工作台，用自然语言生成并迭代你的站点。
                </p>
                <p style="margin:0 0 26px;font-size:14px;line-height:1.7;color:#68636f;">
                  这个链接只能使用一次，并会在短时间后过期。如果不是你发起的注册，可以忽略这封邮件。
                </p>
                <table role="presentation" cellspacing="0" cellpadding="0">
                  <tr>
                    <td style="border-radius:12px;background:#6c3ff5;">
                      <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 22px;border-radius:12px;color:#ffffff;text-decoration:none;font-size:15px;font-weight:800;letter-spacing:0.01em;">确认邮箱并进入 Open-OX</a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:20px 30px 32px;">
                <div style="padding:14px 16px;border-radius:14px;background:#f7f5ff;border:1px solid #e4defc;">
                  <div style="font-size:13px;font-weight:800;color:#433073;">打不开按钮？</div>
                  <div style="margin-top:8px;font-size:12px;line-height:1.6;color:#655d72;word-break:break-all;">
                    复制这个链接到浏览器：<br>
                    <a href="{{ .ConfirmationURL }}" style="color:#6c3ff5;text-decoration:underline;">{{ .ConfirmationURL }}</a>
                  </div>
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:20px 30px;background:#faf9f6;border-top:1px solid #ece8df;">
                <p style="margin:0;font-size:12px;line-height:1.6;color:#8a8490;">
                  Open-OX · AI-powered website builder<br>
                  你收到这封邮件，是因为有人使用此邮箱注册了 Open-OX。
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
