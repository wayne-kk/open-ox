<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>重置你的 Open-OX 密码</title>
  </head>
  <body style="margin:0;background:#f4f3f0;color:#17161b;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',Arial,sans-serif;">
    <div style="display:none;max-height:0;overflow:hidden;opacity:0;">
      使用此安全链接为你的 Open-OX 账户设置新密码。
    </div>
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f3f0;">
      <tr>
        <td align="center" style="padding:36px 16px;">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border:1px solid #dedbd2;border-radius:18px;overflow:hidden;box-shadow:0 18px 48px rgba(23,22,27,0.12);">
            <tr>
              <td style="background:#111114;padding:28px 30px;color:#f6f2ff;">
                <div style="font-size:13px;letter-spacing:0.12em;text-transform:uppercase;color:#b7aceb;">Open-OX</div>
                <div style="margin-top:10px;font-size:28px;line-height:1.2;font-weight:800;">重置密码</div>
              </td>
            </tr>
            <tr>
              <td style="padding:34px 30px 10px;">
                <p style="margin:0 0 18px;font-size:16px;line-height:1.7;color:#3a3740;">
                  我们收到了重置 Open-OX 账户密码的请求。点击下面的按钮设置一个新密码。
                </p>
                <p style="margin:0 0 26px;font-size:14px;line-height:1.7;color:#68636f;">
                  如果这不是你本人操作，请忽略这封邮件。你的旧密码不会因为收到这封邮件而改变。
                </p>
                <table role="presentation" cellspacing="0" cellpadding="0">
                  <tr>
                    <td style="border-radius:12px;background:#17161b;">
                      <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 22px;border-radius:12px;color:#ffffff;text-decoration:none;font-size:15px;font-weight:800;letter-spacing:0.01em;">设置新密码</a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:20px 30px 32px;">
                <div style="padding:14px 16px;border-radius:14px;background:#fff7ed;border:1px solid #fed7aa;">
                  <div style="font-size:13px;font-weight:800;color:#9a3412;">安全提醒</div>
                  <div style="margin-top:8px;font-size:12px;line-height:1.6;color:#7c2d12;">
                    不要把此邮件转发给任何人。链接只能使用一次，并会在短时间后过期。
                  </div>
                </div>
                <div style="margin-top:14px;font-size:12px;line-height:1.6;color:#655d72;word-break:break-all;">
                  复制链接：<br>
                  <a href="{{ .ConfirmationURL }}" style="color:#6c3ff5;text-decoration:underline;">{{ .ConfirmationURL }}</a>
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:20px 30px;background:#faf9f6;border-top:1px solid #ece8df;">
                <p style="margin:0;font-size:12px;line-height:1.6;color:#8a8490;">
                  Open-OX · AI-powered website builder<br>
                  你收到这封邮件，是因为有人请求重置此邮箱对应的 Open-OX 账户密码。
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
