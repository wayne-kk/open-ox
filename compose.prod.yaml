# Production stack (web + generation worker).
#
# Image is built ON THE SERVER (layer cache stays local). Do not pull from ghcr.io
# in the default path — Tencent Cloud → ghcr.io is too slow and caused CI SSH timeouts.
#
# Runtime base (apt + Chromium) is a separate image — build once:
#   bash scripts/build-runtime.sh
# Then daily:
#   docker compose -f compose.prod.yaml --env-file .env.production build
#   docker compose -f compose.prod.yaml --env-file .env.production up -d
#
# Optional TCR runtime:
#   OPEN_OX_RUNTIME_IMAGE=ccr.ccs.tencentyun.com/<ns>/open-ox-runtime:2026.07

services:
  open-ox:
    image: open-ox:${OPEN_OX_IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        RUNTIME_IMAGE: ${OPEN_OX_RUNTIME_IMAGE:-open-ox-runtime:local}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY:-}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
    container_name: open-ox
    restart: unless-stopped
    ports:
      - "${OPEN_OX_HOST_PORT:-3000}:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    volumes:
      - ${OPEN_OX_SITES_DIR:-/sharedata/wayne/open-ox/sites}:/app/sites
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  open-ox-worker:
    # Same image as web — built once by the open-ox service above.
    image: open-ox:${OPEN_OX_IMAGE_TAG:-local}
    container_name: open-ox-generation-worker
    restart: unless-stopped
    command: ["node", "generation-worker.cjs"]
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      OPEN_OX_WORKER_ID: ${OPEN_OX_WORKER_ID:-docker-worker-1}
    volumes:
      - ${OPEN_OX_SITES_DIR:-/sharedata/wayne/open-ox/sites}:/app/sites
    depends_on:
      open-ox:
        condition: service_healthy
