services:
  open-ox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: open-ox
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env.production
    volumes:
      # Persist generated project files across restarts
      - open-ox-sites:/app/sites
      - open-ox-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  open-ox-sites:
  open-ox-logs:
