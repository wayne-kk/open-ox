name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: open-ox:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save & compress image
        run: docker save open-ox:${{ github.sha }} | gzip > /tmp/open-ox.tar.gz

      - name: Generate .env.production
        run: |
          cat > /tmp/.env.production << 'ENVEOF'
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
          E2B_API_KEY=${{ secrets.E2B_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_URL=${{ secrets.OPENAI_API_URL }}
          DIFY_API_URL=${{ secrets.DIFY_API_URL }}
          DIFY_API_KEY=${{ secrets.DIFY_API_KEY }}
          ENVEOF
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' /tmp/.env.production

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: /tmp/open-ox.tar.gz,/tmp/.env.production
          target: /tmp/
          strip_components: 1

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            echo "==> Loading Docker image..."
            docker load < /tmp/open-ox.tar.gz
            rm -f /tmp/open-ox.tar.gz

            cd /opt/open-ox

            # Update .env.production from GitHub Secrets
            mv /tmp/.env.production /opt/open-ox/.env.production
            chmod 600 /opt/open-ox/.env.production

            docker tag open-ox:${{ github.sha }} open-ox:latest

            echo "==> Stopping old container..."
            docker compose down --timeout 30 || true

            echo "==> Starting new container..."
            docker compose up -d

            echo "==> Waiting for health check..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
                echo "==> Healthy! Deploy complete."
                exit 0
              fi
              sleep 2
            done

            echo "==> Health check failed!"
            docker compose logs --tail 50
            exit 1
