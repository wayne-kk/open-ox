name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── CI: Type Check & Build ──────────────────────────────────────────────────
  check:
    name: Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: placeholder
        run: pnpm build

  # ── CI: Tests ───────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        run: npx vitest --run

  # ── CD: Build Docker & Deploy (only on push to main, after CI passes) ──────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [check, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: open-ox:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image & generate env file
        run: |
          docker save open-ox:${{ github.sha }} | gzip > open-ox.tar.gz
          cat > .env.production << 'EOF'
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
          E2B_API_KEY=${{ secrets.E2B_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_URL=${{ secrets.OPENAI_API_URL }}
          DIFY_API_URL=${{ secrets.DIFY_API_URL }}
          DIFY_API_KEY=${{ secrets.DIFY_API_KEY }}
          EOF
          sed -i 's/^          //' .env.production

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: open-ox.tar.gz,.env.production
          target: /tmp/open-ox-deploy

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            echo "==> Loading Docker image..."
            docker load < /tmp/open-ox-deploy/open-ox.tar.gz

            mkdir -p /opt/open-ox
            cd /opt/open-ox

            mv /tmp/open-ox-deploy/.env.production /opt/open-ox/.env.production
            chmod 600 /opt/open-ox/.env.production
            rm -rf /tmp/open-ox-deploy

            docker tag open-ox:${{ github.sha }} open-ox:latest

            echo "==> Stopping old container..."
            docker compose down --timeout 30 || true

            echo "==> Starting new container..."
            docker compose up -d

            echo "==> Waiting for health check..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
                echo "==> Healthy! Deploy complete."
                exit 0
              fi
              sleep 2
            done

            echo "==> Health check failed!"
            docker compose logs --tail 50
            exit 1
