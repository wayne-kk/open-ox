name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── CI: Type Check & Build ──────────────────────────────────────────────────
  check:
    name: Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: placeholder
        run: pnpm build

  # ── CI: Tests ───────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        run: npx vitest --run

  # ── CD: Deploy (only on push to main, after CI passes) ──────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [check, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build with real env vars so NEXT_PUBLIC_ values are correctly inlined
      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          ARK_BASE_URL: ${{ secrets.ARK_BASE_URL }}
          ARK_IMAGE_MODEL: ${{ secrets.ARK_IMAGE_MODEL }}
          ARK_IMAGE_SIZE: ${{ secrets.ARK_IMAGE_SIZE }}
        run: pnpm build

      # Runtime env for pm2 `next start` on the server. Add matching Repository secrets under Settings → Secrets → Actions.
      - name: Generate .env.production
        run: |
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
            echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}"
            echo "NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
            echo "FEISHU_APP_ID=${{ secrets.FEISHU_APP_ID }}"
            echo "FEISHU_APP_SECRET=${{ secrets.FEISHU_APP_SECRET }}"
            echo "FEISHU_OAUTH_HMAC_SECRET=${{ secrets.FEISHU_OAUTH_HMAC_SECRET }}"
            echo "E2B_API_KEY=${{ secrets.E2B_API_KEY }}"
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"
            echo "OPENAI_API_URL=${{ secrets.OPENAI_API_URL }}"
            echo "DIFY_API_URL=${{ secrets.DIFY_API_URL }}"
            echo "DIFY_API_KEY=${{ secrets.DIFY_API_KEY }}"
            echo "ARK_API_KEY=${{ secrets.ARK_API_KEY }}"
            echo "ARK_BASE_URL=${{ secrets.ARK_BASE_URL }}"
            echo "ARK_IMAGE_MODEL=${{ secrets.ARK_IMAGE_MODEL }}"
            echo "ARK_IMAGE_SIZE=${{ secrets.ARK_IMAGE_SIZE }}"
          } > .env.production

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Preflight SSH connectivity
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          set -euo pipefail
          HOST="$SERVER_HOST"
          PORT="${SERVER_PORT:-22}"

          echo "==> Checking TCP reachability to ${HOST}:${PORT}"
          for i in 1 2 3; do
            if timeout 5 bash -c "cat < /dev/null > /dev/tcp/${HOST}/${PORT}"; then
              echo "TCP check passed on attempt ${i}"
              break
            fi
            if [ "$i" -eq 3 ]; then
              echo "ERROR: cannot reach ${HOST}:${PORT} from GitHub runner"
              exit 1
            fi
            echo "Retrying in 3s..."
            sleep 3
          done

          echo "==> Capturing SSH banner (best effort)"
          timeout 5 bash -c "exec 3<>/dev/tcp/${HOST}/${PORT}; head -c 128 <&3" || true

      - name: Add server to known_hosts
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "${SERVER_PORT:-22}" -H "$SERVER_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Sync artifacts to server (rsync incremental)
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -euo pipefail
          APP=/sharedata/wayne/open-ox
          RSYNC_SSH="ssh -p ${SERVER_PORT:-22}"

          rsync -az \
            -e "$RSYNC_SSH" \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.next/cache' \
            --exclude '.planning' \
            --exclude '.cursor' \
            --exclude '.kiro' \
            --exclude 'coverage' \
            --exclude '*.log' \
            ./ "$SERVER_USER@$SERVER_HOST:$APP/"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          timeout: 120s
          command_timeout: 10m
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            APP=/sharedata/wayne/open-ox
            mkdir -p $APP/sites $APP/logs

            echo "==> Preparing app dir..."
            cd $APP

            echo "==> Installing deps..."
            pnpm install --frozen-lockfile

            echo "==> Restarting..."
            pm2 restart open-ox || pm2 start pnpm --name open-ox -- start

            pm2 save
            echo "==> Deploy complete!"

      - name: Notify Feishu (success)
        if: success()
        run: |
          curl -X POST "${{ secrets.FEISHU_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "interactive",
              "card": {
                "header": {
                  "title": { "tag": "plain_text", "content": "✅ 部署成功" },
                  "template": "green"
                },
                "elements": [{
                  "tag": "div",
                  "fields": [
                    { "is_short": true, "text": { "tag": "lark_md", "content": "**项目**\nopen-ox" }},
                    { "is_short": true, "text": { "tag": "lark_md", "content": "**分支**\n${{ github.ref_name }}" }},
                    { "is_short": true, "text": { "tag": "lark_md", "content": "**提交者**\n${{ github.actor }}" }},
                    { "is_short": false, "text": { "tag": "lark_md", "content": "**提交信息**\n${{ github.event.head_commit.message }}" }}
                  ]
                }, {
                  "tag": "action",
                  "actions": [{
                    "tag": "button",
                    "text": { "tag": "plain_text", "content": "查看详情" },
                    "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                    "type": "default"
                  }]
                }]
              }
            }'

      - name: Notify Feishu (failure)
        if: failure()
        run: |
          curl -X POST "${{ secrets.FEISHU_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "interactive",
              "card": {
                "header": {
                  "title": { "tag": "plain_text", "content": "❌ 部署失败" },
                  "template": "red"
                },
                "elements": [{
                  "tag": "div",
                  "fields": [
                    { "is_short": true, "text": { "tag": "lark_md", "content": "**项目**\nopen-ox" }},
                    { "is_short": true, "text": { "tag": "lark_md", "content": "**分支**\n${{ github.ref_name }}" }},
                    { "is_short": true, "text": { "tag": "lark_md", "content": "**提交者**\n${{ github.actor }}" }},
                    { "is_short": false, "text": { "tag": "lark_md", "content": "**提交信息**\n${{ github.event.head_commit.message }}" }}
                  ]
                }, {
                  "tag": "action",
                  "actions": [{
                    "tag": "button",
                    "text": { "tag": "plain_text", "content": "查看日志" },
                    "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                    "type": "danger"
                  }]
                }]
              }
            }'
