name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── CI: Typecheck (fast). Full `next build` only on PRs. ────────────────────
  check:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        if: github.event_name == 'pull_request'
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: placeholder
        run: pnpm build

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        run: npx vitest --run

  # ── CD: rsync → build image ON THE SERVER → compose up ─────────────────────
  # Root cause of prior failures: pulling a Playwright-sized image from ghcr.io
  # onto a Tencent Cloud host exceeds appleboy SSH command_timeout (30m).
  # Fix: keep the Docker layer cache on the server; never pull the app image from GHCR.
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [check, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Generate .env.production
        run: |
          {
            echo "OPEN_OX_IMAGE_TAG=${GITHUB_SHA}"
            echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
            echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}"
            echo "NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}"
            echo "OPEN_OX_PREVIEW_BACKEND=${{ secrets.OPEN_OX_PREVIEW_BACKEND }}"
            echo "OPEN_OX_PREVIEW_CAPTURE_SECRET=${{ secrets.OPEN_OX_PREVIEW_CAPTURE_SECRET }}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
            echo "FEISHU_APP_ID=${{ secrets.FEISHU_APP_ID }}"
            echo "FEISHU_APP_SECRET=${{ secrets.FEISHU_APP_SECRET }}"
            echo "FEISHU_OAUTH_HMAC_SECRET=${{ secrets.FEISHU_OAUTH_HMAC_SECRET }}"
            echo "FEISHU_VERIFICATION_TOKEN=${{ secrets.FEISHU_VERIFICATION_TOKEN }}"
            echo "E2B_API_KEY=${{ secrets.E2B_API_KEY }}"
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"
            echo "OPENAI_API_URL=${{ secrets.OPENAI_API_URL }}"
            echo "DIFY_API_URL=${{ secrets.DIFY_API_URL }}"
            echo "DIFY_API_KEY=${{ secrets.DIFY_API_KEY }}"
            echo "ARK_API_KEY=${{ secrets.ARK_API_KEY }}"
            echo "ARK_BASE_URL=${{ secrets.ARK_BASE_URL }}"
            echo "ARK_IMAGE_MODEL=${{ secrets.ARK_IMAGE_MODEL }}"
            echo "ARK_IMAGE_SIZE=${{ secrets.ARK_IMAGE_SIZE }}"
            echo "VERCEL_CLIENT_ID=${{ secrets.VERCEL_CLIENT_ID }}"
            echo "VERCEL_CLIENT_SECRET=${{ secrets.VERCEL_CLIENT_SECRET }}"
            echo "VERCEL_INTEGRATION_SLUG=${{ secrets.VERCEL_INTEGRATION_SLUG }}"
            echo "VERCEL_TOKEN_ENCRYPTION_KEY=${{ secrets.VERCEL_TOKEN_ENCRYPTION_KEY }}"
          } > .env.production

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Preflight SSH connectivity
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          set -euo pipefail
          HOST="$SERVER_HOST"
          PORT="${SERVER_PORT:-22}"
          echo "==> Checking TCP ${HOST}:${PORT}"
          for i in 1 2 3; do
            if timeout 5 bash -c "cat < /dev/null > /dev/tcp/${HOST}/${PORT}"; then
              echo "TCP ok (attempt ${i})"
              break
            fi
            if [ "$i" -eq 3 ]; then
              echo "ERROR: cannot reach ${HOST}:${PORT}"
              exit 1
            fi
            sleep 3
          done

      - name: Add server to known_hosts
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -p "${SERVER_PORT:-22}" -H "$SERVER_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Sync build context to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -euo pipefail
          APP=/sharedata/wayne/open-ox
          RSYNC_SSH="ssh -p ${SERVER_PORT:-22}"

          # Ensure dest dirs exist and are writable by the deploy user (sites may be uid 1001 from containers).
          ssh -p "${SERVER_PORT:-22}" "$SERVER_USER@$SERVER_HOST" bash -s <<EOF
          set -euo pipefail
          mkdir -p "$APP/sites/template" "$APP/logs"
          if [ -d "$APP/sites" ] && [ ! -w "$APP/sites/template" ]; then
            sudo chown -R "$SERVER_USER:$SERVER_USER" "$APP/sites/template" || true
          fi
          # Runtime writes from container (uid 1001) + rsync from ubuntu must both work.
          sudo chmod -R a+rwX "$APP/sites" || chmod -R a+rwX "$APP/sites" || true
          EOF

          # Incremental sync — no --delete. Server keeps logs/, .open-ox/, sites/{projectId}/.
          rsync -az \
            -e "$RSYNC_SSH" \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.next' \
            --exclude 'coverage' \
            --exclude '.scratch' \
            --exclude '.cursor' \
            --exclude '.planning' \
            --exclude '.kiro' \
            --exclude 'docs' \
            --exclude 'e2b-template' \
            --exclude 'sites' \
            --exclude 'logs' \
            --exclude '.open-ox' \
            --exclude '*.log' \
            ./ "$SERVER_USER@$SERVER_HOST:$APP/"

          # Template only — baked into image too, but host volume overlays /app/sites.
          rsync -az \
            -e "$RSYNC_SSH" \
            sites/template/ "$SERVER_USER@$SERVER_HOST:$APP/sites/template/"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          timeout: 120s
          # First server-side image build (Playwright + next) can exceed 30m; later builds use local cache.
          command_timeout: 60m
          envs: IMAGE_TAG
          script: |
            set -euo pipefail
            export OPEN_OX_IMAGE_TAG="${IMAGE_TAG}"
            export OPEN_OX_APP_DIR=/sharedata/wayne/open-ox
            bash /sharedata/wayne/open-ox/scripts/deploy-on-server.sh
        env:
          IMAGE_TAG: ${{ github.sha }}

      - name: Notify Feishu (success)
        if: success()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload=$(jq -n \
            --arg repo "open-ox" \
            --arg branch "$BRANCH" \
            --arg actor "$ACTOR" \
            --arg msg "$COMMIT_MSG" \
            --arg run_url "$RUN_URL" \
            '{
              msg_type: "interactive",
              card: {
                header: {
                  title: { tag: "plain_text", content: "✅ 部署成功" },
                  template: "green"
                },
                elements: [
                  {
                    tag: "div",
                    fields: [
                      { is_short: true, text: { tag: "lark_md", content: ("**项目**\n" + $repo) } },
                      { is_short: true, text: { tag: "lark_md", content: ("**分支**\n" + $branch) } },
                      { is_short: true, text: { tag: "lark_md", content: ("**提交者**\n" + $actor) } },
                      { is_short: false, text: { tag: "lark_md", content: ("**提交信息**\n" + $msg) } }
                    ]
                  },
                  {
                    tag: "action",
                    actions: [
                      {
                        tag: "button",
                        text: { tag: "plain_text", content: "查看详情" },
                        url: $run_url,
                        type: "default"
                      }
                    ]
                  }
                ]
              }
            }')
          curl -X POST "$FEISHU_WEBHOOK" -H "Content-Type: application/json" -d "$payload"

      - name: Notify Feishu (failure)
        if: failure()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload=$(jq -n \
            --arg repo "open-ox" \
            --arg branch "$BRANCH" \
            --arg actor "$ACTOR" \
            --arg msg "$COMMIT_MSG" \
            --arg run_url "$RUN_URL" \
            '{
              msg_type: "interactive",
              card: {
                header: {
                  title: { tag: "plain_text", content: "❌ 部署失败" },
                  template: "red"
                },
                elements: [
                  {
                    tag: "div",
                    fields: [
                      { is_short: true, text: { tag: "lark_md", content: ("**项目**\n" + $repo) } },
                      { is_short: true, text: { tag: "lark_md", content: ("**分支**\n" + $branch) } },
                      { is_short: true, text: { tag: "lark_md", content: ("**提交者**\n" + $actor) } },
                      { is_short: false, text: { tag: "lark_md", content: ("**提交信息**\n" + $msg) } }
                    ]
                  },
                  {
                    tag: "action",
                    actions: [
                      {
                        tag: "button",
                        text: { tag: "plain_text", content: "查看日志" },
                        url: $run_url,
                        type: "danger"
                      }
                    ]
                  }
                ]
              }
            }')
          curl -X POST "$FEISHU_WEBHOOK" -H "Content-Type: application/json" -d "$payload"
