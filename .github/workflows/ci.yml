name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── CI: Type Check & Build ──────────────────────────────────────────────────
  check:
    name: Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: placeholder
        run: pnpm build

  # ── CI: Tests ───────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        run: npx vitest --run

  # ── CD: Deploy (only on push to main, after CI passes) ──────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [check, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build with real env vars so NEXT_PUBLIC_ values are correctly inlined
      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
        run: pnpm build

      # Runtime env for pm2 `next start` on the server. Add matching Repository secrets under Settings → Secrets → Actions.
      - name: Generate .env.production
        run: |
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
            echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}"
            echo "NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
            echo "FEISHU_APP_ID=${{ secrets.FEISHU_APP_ID }}"
            echo "FEISHU_APP_SECRET=${{ secrets.FEISHU_APP_SECRET }}"
            echo "FEISHU_OAUTH_HMAC_SECRET=${{ secrets.FEISHU_OAUTH_HMAC_SECRET }}"
            echo "E2B_API_KEY=${{ secrets.E2B_API_KEY }}"
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"
            echo "OPENAI_API_URL=${{ secrets.OPENAI_API_URL }}"
            echo "DIFY_API_URL=${{ secrets.DIFY_API_URL }}"
            echo "DIFY_API_KEY=${{ secrets.DIFY_API_KEY }}"
          } > .env.production

      # Pack: source + build output (no node_modules, no .git)
      - name: Package artifacts
        run: |
          tar -czf /tmp/deploy.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='sites/*/node_modules' \
            --exclude='sites/*/.next' \
            --exclude='.next/cache' \
            --exclude='.planning' \
            --exclude='.cursor' \
            --exclude='.kiro' \
            .
          mv /tmp/deploy.tar.gz deploy.tar.gz

      - name: Copy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: deploy.tar.gz
          target: /sharedata/wayne/open-ox

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            APP=/sharedata/wayne/open-ox
            mkdir -p $APP/sites $APP/logs

            echo "==> Extracting..."
            cd $APP
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz

            echo "==> Installing deps..."
            pnpm install --frozen-lockfile

            echo "==> Restarting..."
            pm2 restart open-ox || pm2 start pnpm --name open-ox -- start

            pm2 save
            echo "==> Deploy complete!"

      - name: Notify Feishu (success)
        if: success()
        run: |
          curl -X POST "${{ secrets.FEISHU_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "interactive",
              "card": {
                "header": {
                  "title": { "tag": "plain_text", "content": "✅ 部署成功" },
                  "template": "green"
                },
                "elements": [{
                  "tag": "div",
                  "fields": [
                    { "is_short": true, "text": { "tag": "lark_md", "content": "**项目**\nopen-ox" }},
                    { "is_short": true, "text": { "tag": "lark_md", "content": "**分支**\n${{ github.ref_name }}" }},
                    { "is_short": true, "text": { "tag": "lark_md", "content": "**提交者**\n${{ github.actor }}" }},
                    { "is_short": false, "text": { "tag": "lark_md", "content": "**提交信息**\n${{ github.event.head_commit.message }}" }}
                  ]
                }, {
                  "tag": "action",
                  "actions": [{
                    "tag": "button",
                    "text": { "tag": "plain_text", "content": "查看详情" },
                    "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                    "type": "default"
                  }]
                }]
              }
            }'

      - name: Notify Feishu (failure)
        if: failure()
        run: |
          curl -X POST "${{ secrets.FEISHU_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "interactive",
              "card": {
                "header": {
                  "title": { "tag": "plain_text", "content": "❌ 部署失败" },
                  "template": "red"
                },
                "elements": [{
                  "tag": "div",
                  "fields": [
                    { "is_short": true, "text": { "tag": "lark_md", "content": "**项目**\nopen-ox" }},
                    { "is_short": true, "text": { "tag": "lark_md", "content": "**分支**\n${{ github.ref_name }}" }},
                    { "is_short": true, "text": { "tag": "lark_md", "content": "**提交者**\n${{ github.actor }}" }},
                    { "is_short": false, "text": { "tag": "lark_md", "content": "**提交信息**\n${{ github.event.head_commit.message }}" }}
                  ]
                }, {
                  "tag": "action",
                  "actions": [{
                    "tag": "button",
                    "text": { "tag": "plain_text", "content": "查看日志" },
                    "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                    "type": "danger"
                  }]
                }]
              }
            }'
