name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: wayne-kk/open-ox

jobs:
  # ── CI: Typecheck (fast). Full `next build` only on PRs — main deploy builds inside Docker. ──
  check:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      # Catch Next build breaks before merge; skip on main to avoid duplicating Docker's build (~2min).
      - name: Build
        if: github.event_name == 'pull_request'
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: placeholder
        run: pnpm build

  # ── CI: Tests ───────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        run: npx vitest --run

  # ── CD: Docker image → GHCR → compose on server (only on push to main) ─────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [check, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Image metadata
        id: meta
        run: |
          echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # NEXT_PUBLIC_* must be present at `next build` inside the Dockerfile.
      # GHA + registry cache: deps/browsers/apt layers reuse across deploys; only builder rebuilds on code change.
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
          cache-from: |
            type=gha
            type=registry,ref=${{ steps.meta.outputs.image }}:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=${{ steps.meta.outputs.image }}:buildcache,mode=max

      # Runtime env for containers. Add matching Repository secrets under Settings → Secrets → Actions.
      - name: Generate .env.production
        run: |
          {
            echo "OPEN_OX_IMAGE_TAG=${{ steps.meta.outputs.tag }}"
            echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
            echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}"
            echo "NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}"
            echo "OPEN_OX_PREVIEW_BACKEND=${{ secrets.OPEN_OX_PREVIEW_BACKEND }}"
            echo "OPEN_OX_PREVIEW_CAPTURE_SECRET=${{ secrets.OPEN_OX_PREVIEW_CAPTURE_SECRET }}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
            echo "FEISHU_APP_ID=${{ secrets.FEISHU_APP_ID }}"
            echo "FEISHU_APP_SECRET=${{ secrets.FEISHU_APP_SECRET }}"
            echo "FEISHU_OAUTH_HMAC_SECRET=${{ secrets.FEISHU_OAUTH_HMAC_SECRET }}"
            echo "FEISHU_VERIFICATION_TOKEN=${{ secrets.FEISHU_VERIFICATION_TOKEN }}"
            echo "E2B_API_KEY=${{ secrets.E2B_API_KEY }}"
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"
            echo "OPENAI_API_URL=${{ secrets.OPENAI_API_URL }}"
            echo "DIFY_API_URL=${{ secrets.DIFY_API_URL }}"
            echo "DIFY_API_KEY=${{ secrets.DIFY_API_KEY }}"
            echo "ARK_API_KEY=${{ secrets.ARK_API_KEY }}"
            echo "ARK_BASE_URL=${{ secrets.ARK_BASE_URL }}"
            echo "ARK_IMAGE_MODEL=${{ secrets.ARK_IMAGE_MODEL }}"
            echo "ARK_IMAGE_SIZE=${{ secrets.ARK_IMAGE_SIZE }}"
            echo "VERCEL_CLIENT_ID=${{ secrets.VERCEL_CLIENT_ID }}"
            echo "VERCEL_CLIENT_SECRET=${{ secrets.VERCEL_CLIENT_SECRET }}"
            echo "VERCEL_INTEGRATION_SLUG=${{ secrets.VERCEL_INTEGRATION_SLUG }}"
            echo "VERCEL_TOKEN_ENCRYPTION_KEY=${{ secrets.VERCEL_TOKEN_ENCRYPTION_KEY }}"
          } > .env.production

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Preflight SSH connectivity
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          set -euo pipefail
          HOST="$SERVER_HOST"
          PORT="${SERVER_PORT:-22}"

          echo "==> Checking TCP reachability to ${HOST}:${PORT}"
          for i in 1 2 3; do
            if timeout 5 bash -c "cat < /dev/null > /dev/tcp/${HOST}/${PORT}"; then
              echo "TCP check passed on attempt ${i}"
              break
            fi
            if [ "$i" -eq 3 ]; then
              echo "ERROR: cannot reach ${HOST}:${PORT} from GitHub runner"
              exit 1
            fi
            echo "Retrying in 3s..."
            sleep 3
          done

          echo "==> Capturing SSH banner (best effort)"
          timeout 5 bash -c "exec 3<>/dev/tcp/${HOST}/${PORT}; head -c 128 <&3" || true

      - name: Add server to known_hosts
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "${SERVER_PORT:-22}" -H "$SERVER_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Sync compose + env to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -euo pipefail
          APP=/sharedata/wayne/open-ox
          RSYNC_SSH="ssh -p ${SERVER_PORT:-22}"

          ssh -p "${SERVER_PORT:-22}" "$SERVER_USER@$SERVER_HOST" "mkdir -p $APP/sites"

          rsync -az \
            -e "$RSYNC_SSH" \
            compose.prod.yaml \
            .env.production \
            "$SERVER_USER@$SERVER_HOST:$APP/"

      - name: Deploy on server (Docker Compose)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          timeout: 120s
          command_timeout: 30m
          envs: GHCR_TOKEN,GHCR_USER,IMAGE_TAG
          script: |
            set -euo pipefail
            # Non-interactive SSH often has a minimal PATH; Docker is usually here.
            export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:${PATH:-}"

            APP=/sharedata/wayne/open-ox
            mkdir -p "$APP"
            cd "$APP"

            run_root() {
              if [ "$(id -u)" -eq 0 ]; then
                "$@"
              elif command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
                sudo "$@"
              else
                return 1
              fi
            }

            ensure_docker() {
              if command -v docker >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
                return 0
              fi
              echo "==> Docker missing — attempting first-time install..."
              if ! run_root true; then
                echo "ERROR: docker not found and cannot install (need root or passwordless sudo)."
                echo "SSH in and run as root:"
                echo "  curl -fsSL https://get.docker.com | sh"
                echo "  systemctl enable --now docker"
                echo "  apt-get update && apt-get install -y docker-compose-plugin"
                echo "If SERVER_USER is not root: usermod -aG docker \"\$SERVER_USER\" && re-login"
                exit 127
              fi
              if ! command -v docker >/dev/null 2>&1; then
                curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
                run_root sh /tmp/get-docker.sh
                rm -f /tmp/get-docker.sh
              fi
              run_root systemctl enable docker || true
              run_root systemctl start docker
              if ! docker compose version >/dev/null 2>&1; then
                run_root apt-get update
                run_root apt-get install -y docker-compose-plugin
              fi
              # Non-root deploy user needs docker group (takes effect next SSH session;
              # for this session use root socket via sg if possible).
              DEPLOY_USER="$(id -un)"
              if [ "$(id -u)" -ne 0 ]; then
                run_root usermod -aG docker "$DEPLOY_USER" || true
                if ! docker info >/dev/null 2>&1; then
                  echo "ERROR: Docker installed but user '$DEPLOY_USER' cannot talk to the daemon yet."
                  echo "Run once as root: usermod -aG docker $DEPLOY_USER"
                  echo "Then re-run this Actions job (new SSH session picks up the group)."
                  exit 127
                fi
              fi
            }

            ensure_docker
            echo "==> Docker: $(docker --version)"

            echo "==> Ensuring sites dir is writable by container user (uid 1001)..."
            mkdir -p "$APP/sites"
            run_root chown -R 1001:1001 "$APP/sites" 2>/dev/null || chown -R 1001:1001 "$APP/sites" 2>/dev/null || true

            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "==> Logging in to GHCR..."
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "${GHCR_USER:-wayne-kk}" --password-stdin
            else
              echo "==> GHCR_READ_TOKEN not set — pulling without login (package must be public)"
            fi

            echo "==> Pulling image tag ${IMAGE_TAG}..."
            export OPEN_OX_IMAGE_TAG="${IMAGE_TAG}"
            docker compose -f compose.prod.yaml --env-file .env.production pull

            echo "==> Stopping legacy PM2 processes (if any)..."
            if command -v pm2 >/dev/null 2>&1; then
              pm2 delete open-ox 2>/dev/null || true
              pm2 delete open-ox-generation-worker 2>/dev/null || true
              pm2 save 2>/dev/null || true
            fi

            echo "==> Starting containers..."
            docker compose -f compose.prod.yaml --env-file .env.production up -d --remove-orphans

            echo "==> Status:"
            docker compose -f compose.prod.yaml --env-file .env.production ps
            echo "==> Deploy complete!"
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}

      - name: Notify Feishu (success)
        if: success()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload=$(jq -n \
            --arg repo "open-ox" \
            --arg branch "$BRANCH" \
            --arg actor "$ACTOR" \
            --arg msg "$COMMIT_MSG" \
            --arg run_url "$RUN_URL" \
            '{
              msg_type: "interactive",
              card: {
                header: {
                  title: { tag: "plain_text", content: "✅ 部署成功" },
                  template: "green"
                },
                elements: [
                  {
                    tag: "div",
                    fields: [
                      { is_short: true, text: { tag: "lark_md", content: ("**项目**\n" + $repo) } },
                      { is_short: true, text: { tag: "lark_md", content: ("**分支**\n" + $branch) } },
                      { is_short: true, text: { tag: "lark_md", content: ("**提交者**\n" + $actor) } },
                      { is_short: false, text: { tag: "lark_md", content: ("**提交信息**\n" + $msg) } }
                    ]
                  },
                  {
                    tag: "action",
                    actions: [
                      {
                        tag: "button",
                        text: { tag: "plain_text", content: "查看详情" },
                        url: $run_url,
                        type: "default"
                      }
                    ]
                  }
                ]
              }
            }')

          curl -X POST "$FEISHU_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$payload"

      - name: Notify Feishu (failure)
        if: failure()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload=$(jq -n \
            --arg repo "open-ox" \
            --arg branch "$BRANCH" \
            --arg actor "$ACTOR" \
            --arg msg "$COMMIT_MSG" \
            --arg run_url "$RUN_URL" \
            '{
              msg_type: "interactive",
              card: {
                header: {
                  title: { tag: "plain_text", content: "❌ 部署失败" },
                  template: "red"
                },
                elements: [
                  {
                    tag: "div",
                    fields: [
                      { is_short: true, text: { tag: "lark_md", content: ("**项目**\n" + $repo) } },
                      { is_short: true, text: { tag: "lark_md", content: ("**分支**\n" + $branch) } },
                      { is_short: true, text: { tag: "lark_md", content: ("**提交者**\n" + $actor) } },
                      { is_short: false, text: { tag: "lark_md", content: ("**提交信息**\n" + $msg) } }
                    ]
                  },
                  {
                    tag: "action",
                    actions: [
                      {
                        tag: "button",
                        text: { tag: "plain_text", content: "查看日志" },
                        url: $run_url,
                        type: "danger"
                      }
                    ]
                  }
                ]
              }
            }')

          curl -X POST "$FEISHU_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$payload"
