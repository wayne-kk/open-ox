apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: open-ox
  # annotations:
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  #   nginx.ingress.kubernetes.io/proxy-body-size: 32m
spec:
  ingressClassName: nginx
  # Uncomment after cert-manager (or manual) creates open-ox-tls:
  # tls:
  #   - hosts: [demo.example.com]
  #     secretName: open-ox-tls
  rules:
    - host: demo.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: open-ox
                port:
                  number: 80
