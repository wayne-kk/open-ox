# Example only — do NOT commit real values.
# Create the real Secret in the cluster, e.g.:
#   kubectl -n open-ox-demo create secret generic open-ox-env --from-env-file=prod.env
#
# Keys below match .env.example (Core + optional capability packs).
# Note: NEXT_PUBLIC_* must match the values used when building the Docker image.

apiVersion: v1
kind: Secret
metadata:
  name: open-ox-env
  namespace: open-ox-demo
type: Opaque
stringData:
  # --- Core ---
  NEXT_PUBLIC_SUPABASE_URL: ""
  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ""
  NEXT_PUBLIC_SITE_URL: "https://example.com"
  # Complete official filing labels displayed in the footer.
  NEXT_PUBLIC_ICP_FILING_NUMBER: ""
  NEXT_PUBLIC_PUBLIC_SECURITY_FILING_NUMBER: ""
  # Dedicated static-preview origin (different host). Example: https://p.example.com
  NEXT_PUBLIC_PREVIEW_ORIGIN: "https://p.example.com"
  SUPABASE_SERVICE_ROLE_KEY: ""
  OPENAI_API_KEY: ""
  OPENAI_API_URL: "https://api.openai.com/v1"

  # Preview: local (omit) | storage (public Supabase bucket site-previews) | e2b
  OPEN_OX_PREVIEW_BACKEND: "storage"
  # Server-side cover capture against /site-previews (Playwright shared secret)
  OPEN_OX_PREVIEW_CAPTURE_SECRET: ""
  E2B_API_KEY: ""

  # Credits / billing. Apply migrations 026 + 027 before enabling.
  CREDITS_ENABLED: "1"
  CREDITS_USD_PER_CREDIT: "0.25"
  CREDITS_MARGIN: "1"
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  STRIPE_PRICE_PRO_100: ""
  STRIPE_PRICE_PRO_200: ""
  STRIPE_PRICE_PRO_400: ""
  STRIPE_PRICE_TOPUP_50: ""
  STRIPE_PRICE_TOPUP_100: ""
  STRIPE_PRICE_TOPUP_200: ""

  # Auth (optional)
  FEISHU_APP_ID: ""
  FEISHU_APP_SECRET: ""
  FEISHU_OAUTH_HMAC_SECRET: ""
  # Feishu Bot events — verification token from app event subscription
  FEISHU_VERIFICATION_TOKEN: ""

  # BYO Vercel Deploy (optional — Integrations + Studio Deploy)
  # Create a Vercel Integration, set Redirect URL to
  #   {NEXT_PUBLIC_SITE_URL}/api/integrations/vercel/callback
  VERCEL_CLIENT_ID: ""
  VERCEL_CLIENT_SECRET: ""
  VERCEL_INTEGRATION_SLUG: ""
  VERCEL_TOKEN_ENCRYPTION_KEY: ""
  # Optional override; defaults to {origin}/api/integrations/vercel/callback
  # VERCEL_REDIRECT_URI: ""
