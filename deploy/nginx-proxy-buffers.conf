# Snippet for nginx reverse-proxy to Next.js (e.g. pm2 `next start` on 127.0.0.1:3000).
# Supabase SSR sets large Set-Cookie headers on auth redirects; default proxy_buffer_size (often 4k–8k)
# triggers: upstream sent too big header while reading response header from upstream
#
# Include inside your `location /` (or server) block that proxy_passes to Node:

proxy_buffer_size 128k;
proxy_buffers 4 256k;
proxy_busy_buffers_size 256k;
